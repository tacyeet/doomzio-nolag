<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Doomz.io (sanitized)</title>
  <style>
    :root{
      --bg:#0b0d12;

      /* Banner-inspired palette */
      --accent:#7c5cff;          /* purple */
      --accent2:#f2c94c;         /* gold */
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.66);
      --muted2:rgba(255,255,255,.54);
      --border:rgba(255,255,255,.16);
      --shadow:0 18px 45px rgba(0,0,0,.48);
      --radius:18px;

      /* glass */
      --glassA: rgba(18, 16, 30, .56);
      --glassB: rgba(10, 12, 18, .34);
    }

    html, body {
      height:100%;
      margin:0;
      background:var(--bg);
      overflow:hidden;
      color:var(--text);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
    }

    /* Unity stays full screen */
    #unityContainer { position:relative; width:100%; height:100%; }
    canvas { width:100% !important; height:100% !important; display:block; }

    /* Overlay: only as tall as needed */
    #discordOverlay {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 410px;
      z-index: 9999;
      display: block;
      pointer-events: auto;
    }

    /* Hide completely (no collapse pill) */
    body.discord-hidden #discordOverlay { display:none !important; }

    /* Hide on small screens */
    @media (max-width: 1020px){
      #discordOverlay{ display:none; }
    }

    /* Glass card */
    .card{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background:
        radial-gradient(120% 110% at 12% 0%, rgba(124,92,255,.26) 0%, rgba(124,92,255,.09) 45%, rgba(0,0,0,0) 75%),
        radial-gradient(130% 120% at 90% 20%, rgba(242,201,76,.16) 0%, rgba(242,201,76,.05) 35%, rgba(0,0,0,0) 70%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0)),
        var(--glassA);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Banner-ish top */
    #banner {
      height: 86px;
      position: relative;
      background:
        linear-gradient(90deg, rgba(124,92,255,.32), rgba(242,201,76,.18)),
        radial-gradient(120% 140% at 20% 20%, rgba(124,92,255,.35), rgba(0,0,0,0) 60%),
        radial-gradient(140% 120% at 90% 60%, rgba(242,201,76,.20), rgba(0,0,0,0) 65%),
        rgba(0,0,0,.18);
    }
    /* Optional real banner file: put discord_banner.webp in repo root */
    #banner::after{
      content:"";
      position:absolute; inset:0;
      background-image: url("discord_banner.webp");
      background-size: cover;
      background-position: center;
      opacity: .38;
      filter: saturate(1.1) contrast(1.05);
      pointer-events:none;
    }
    #banner::before{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.55));
      pointer-events:none;
    }

    /* Header */
    #hero{
      padding: 12px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
    }
    #heroTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
    }
    #guildName{
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tagline{
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #statsRow{
      margin-top: 10px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.12);
      font-size: 12px;
      color: var(--text);
    }
    .pill .live{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #39ff88;
      box-shadow: 0 0 0 3px rgba(57,255,136,.14);
    }

    /* Buttons */
    .btnRow{ display:flex; gap: 10px; align-items:center; }
    .btn{
      appearance:none;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.14);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .btn:hover{ background: rgba(255,255,255,.10); }

    .btnPrimary{
      border: 1px solid rgba(242,201,76,.55);
      background: rgba(242,201,76,.16);
      font-weight: 850;
    }
    .btnPrimary:hover{ filter: brightness(1.1); }

    /* Avatar strip */
    #avatarStrip{
      padding: 12px 14px 0;
      display:flex;
      align-items:center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .avatar{
      width: 26px; height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      object-fit: cover;
    }
    #moreText{ color: var(--muted2); font-size: 12px; margin-left: 2px; }

    /* List */
    #listWrap{
      padding: 10px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }
    #listTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      color: var(--muted);
      font-size: 12px;
    }

    /* cap list height so overlay stays compact */
    #members{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.14);
      border-radius: 14px;
      overflow:auto;
      max-height: 260px;
    }

    .member{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 9px 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .member:last-child{ border-bottom:none; }
    .mDot{
      width: 8px; height: 8px; border-radius: 999px;
      background:#39ff88;
      box-shadow:0 0 0 3px rgba(57,255,136,.12);
      flex: 0 0 auto;
    }
    .mName{
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mGame{
      margin-left:auto;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 45%;
    }

    /* Footer */
    #footer{
      margin-top: 10px;
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      background: rgba(0,0,0,.10);
    }
    #footerHint{
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 62%;
    }
  </style>
</head>

<body>
  <div id="unityContainer"></div>

  <!-- Glass overlay panel (picker screen only) -->
  <div id="discordOverlay" aria-label="Discord server panel overlay">
    <div class="card">
      <div id="banner" aria-hidden="true"></div>

      <div id="hero">
        <div id="heroTop">
          <div style="min-width:0">
            <div id="guildName">Doomz.io 2</div>
            <div id="tagline">Community • updates • squads • events</div>
          </div>
          <div class="btnRow">
            <button class="btn" id="btnClose" title="Close until reload">✕</button>
          </div>
        </div>

        <div id="statsRow">
          <span class="pill"><span class="live"></span><span id="onlineCount">Online: …</span></span>
        </div>
      </div>

      <div id="avatarStrip" aria-label="Online members preview"></div>

      <div id="listWrap">
        <div id="listTitle">
          <span>Online now</span>
          <span id="updatedAt"></span>
        </div>

        <div id="members" role="list" aria-label="Online members list"></div>

        <div id="footer">
          <div id="footerHint">Join the Doomz.io 2 Discord</div>
          <button class="btn btnPrimary" id="joinBtn">Join</button>
        </div>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: cache-bust this so GitHub Pages doesn't serve old versions -->
  <script src="chat_sanitize.js?v=2026-02-27-1"></script>

  <!-- Unity loader -->
  <script src="doomz.js"></script>

  <script>
    const inviteUrl = "https://discord.com/invite/doomzio";
    const widgetJsonUrl = "https://discord.com/api/guilds/1457850861035458704/widget.json";

    const onlineCountEl = document.getElementById("onlineCount");
    const avatarStripEl = document.getElementById("avatarStrip");
    const membersEl = document.getElementById("members");
    const updatedAtEl = document.getElementById("updatedAt");

    function closeOverlay() {
      document.body.classList.add("discord-hidden");
    }

    document.getElementById("btnClose").addEventListener("click", closeOverlay);
    document.getElementById("joinBtn").addEventListener("click", () => {
      window.open(inviteUrl, "_blank", "noopener,noreferrer");
    });

    // ---- Arm enter-game detection only after the picker should exist ----
    // Game boot: ~4s to reach name/server picker.
    // We arm slightly after, plus instantly on user intent (click/key).
    window.__doomzEnterArmed = false;

    function armEnter(reason){
      if (window.__doomzEnterArmed) return;
      window.__doomzEnterArmed = true;
      // console.log("ARMED enter detection:", reason, performance.now());
    }

    setTimeout(() => armEnter("timer"), 4800);
    window.addEventListener("keydown",   () => armEnter("keydown"),   { once:true });
    window.addEventListener("mousedown", () => armEnter("mousedown"), { once:true });
    window.addEventListener("touchstart",() => armEnter("touchstart"),{ once:true });

    // When we REALLY enter game, remove overlay completely
    window.addEventListener("doomz:enteredGame", (ev) => {
      // extra guard (should already be gated in JS too)
      if (!window.__doomzEnterArmed) return;

      closeOverlay();
      const el = document.getElementById("discordOverlay");
      if (el) el.remove();
    });

    function fmtTime(d){
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }
    function clearChildren(el){ while(el.firstChild) el.removeChild(el.firstChild); }
    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function renderWidget(data){
      const presence = (typeof data?.presence_count === "number") ? data.presence_count : null;
      onlineCountEl.textContent = presence !== null ? `Online: ${presence}` : "Online: ?";

      const members = Array.isArray(data?.members) ? data.members : [];

      // Avatar strip
      clearChildren(avatarStripEl);
      const maxAvatars = 12;
      for (let i = 0; i < Math.min(maxAvatars, members.length); i++) {
        const m = members[i];
        const img = document.createElement("img");
        img.className = "avatar";
        img.alt = m.username || "member";
        img.title = m.username || "";
        img.src = m.avatar_url || "";
        avatarStripEl.appendChild(img);
      }
      if (members.length > maxAvatars) {
        const more = document.createElement("span");
        more.id = "moreText";
        more.textContent = `+${members.length - maxAvatars} more`;
        avatarStripEl.appendChild(more);
      }

      // Member list
      clearChildren(membersEl);
      if (members.length === 0) {
        const row = document.createElement("div");
        row.className = "member";
        row.innerHTML = `<span style="color: rgba(255,255,255,.60); font-size:12px;">Nobody online (or widget disabled)</span>`;
        membersEl.appendChild(row);
      } else {
        members.sort((a,b) => (a.username||"").localeCompare(b.username||""));
        for (const m of members) {
          const row = document.createElement("div");
          row.className = "member";
          const game = (m.game && typeof m.game === "string") ? m.game : "";
          row.innerHTML = `
            <span class="mDot" aria-hidden="true"></span>
            <span class="mName">${escapeHtml(m.username || "member")}</span>
            <span class="mGame">${escapeHtml(game)}</span>
          `;
          membersEl.appendChild(row);
        }
      }

      updatedAtEl.textContent = `Updated ${fmtTime(new Date())}`;
      widgetStateEl.textContent = "Widget: live";
    }

    async function refreshDiscordWidget(){
      try{
        const res = await fetch(widgetJsonUrl, { cache: "no-store" });
        if(!res.ok) throw new Error("bad status");
        const data = await res.json();
        renderWidget(data);
      }catch{
        widgetStateEl.textContent = "Widget: unavailable";
        onlineCountEl.textContent = "Online: ?";
        updatedAtEl.textContent = "";
        clearChildren(avatarStripEl);
        clearChildren(membersEl);
        const row = document.createElement("div");
        row.className = "member";
        row.innerHTML = `<span style="color: rgba(255,255,255,.60); font-size:12px;">Discord widget.json not reachable.</span>`;
        membersEl.appendChild(row);
      }
    }

    refreshDiscordWidget();
    setInterval(refreshDiscordWidget, 30000);

    UnityLoader.instantiate("unityContainer", "doomz.json", {});
  </script>
</body>
</html>
